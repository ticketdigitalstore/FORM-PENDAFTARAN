<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Run Registration</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Poppins', sans-serif;
  background: linear-gradient(135deg, #00c6ff, #0072ff);
  color:#fff;
}

/* HEADER BANNER */
.header {
  position:relative;
}
.header img {
  width:100%;
  height:200px;
  object-fit:cover;
}
.timer {
  position:absolute;
  bottom:10px;
  right:20px;
  background:#ff416c;
  padding:8px 15px;
  border-radius:20px;
  font-weight:bold;
}

/* CONTAINER */
.container {
  max-width:600px;
  margin:20px auto;
  background:rgba(255,255,255,0.1);
  padding:20px;
  border-radius:20px;
  backdrop-filter: blur(10px);
}

/* SECTION */
.section { display:none; }
.section.active { display:block; }

/* INPUT */
input, select, textarea {
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:10px;
}

/* BUTTON */
button {
  padding:12px 20px;
  margin-top:10px;
  border:none;
  border-radius:30px;
  background: linear-gradient(90deg, #ff416c, #ff4b2b);
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

/* QRIS */
.qris {
  text-align:center;
}
.qris img {
  width:200px;
  margin-bottom:10px;
}

/* LOADING */
.loading, .thankyou {
  display:none;
  text-align:center;
}
.spinner {
  border:6px solid #fff;
  border-top:6px solid #ff416c;
  border-radius:50%;
  width:50px;
  height:50px;
  animation:spin 1s linear infinite;
  margin:20px auto;
}
@keyframes spin {
  100% { transform:rotate(360deg); }
}
</style>
</head>

<body>

<div class="header">
<img src="banner.jpg">
<div class="timer" id="timer">10:00</div>
</div>

<div class="container">

<!-- SECTION 1 -->
<div class="section active">
<h3>Personal Information</h3>
<input type="text" placeholder="Full Name" required>
<input type="email" placeholder="Email" required>
<input type="text" placeholder="Phone Number" required>
<select required>
<option value="">Gender</option>
<option>Male</option>
<option>Female</option>
</select>
<button onclick="next()">Next</button>
</div>

<!-- SECTION 2 -->
<div class="section">
<h3>Race Category</h3>
<select required>
<option value="">Category</option>
<option>5K</option>
<option>10K</option>
<option>Half Marathon</option>
<option>Full Marathon</option>
</select>
<select required>
<option value="">T-Shirt Size</option>
<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>
</select>
<button onclick="prev()">Back</button>
<button onclick="next()">Next</button>
</div>

<!-- SECTION 3 -->
<div class="section">
<h3>Health</h3>
<input type="text" placeholder="Blood Type" required>
<textarea placeholder="Medical Condition" required></textarea>
<input type="text" placeholder="Emergency Contact" required>
<button onclick="prev()">Back</button>
<button onclick="next()">Next</button>
</div>

<!-- SECTION 4 -->
<div class="section">
<h3>Payment</h3>

<div class="qris">
<p>Scan QRIS:</p>
<img src="qris-pembayaran.png"> <!-- GANTI QRIS DISINI -->
</div>

<select required>
<option value="">Payment Method</option>
<option>QRIS</option>
<option>Bank Transfer</option>
<option>E-Wallet</option>
</select>

<input type="file" required>

<button onclick="prev()">Back</button>
<button onclick="submitForm()">Submit</button>
</div>

<!-- LOADING -->
<div class="loading" id="loading">
<div class="spinner"></div>
<p>Processing...</p>
</div>

<!-- THANK YOU -->
<div class="thankyou" id="thankyou">
<h2>🎉 Registration Successful!</h2>
<p>Kami akan konfirmasi melalui E-mail Anda.</p>
<p>Silakan cek inbox atau spam secara berkala.</p>
🔥 See you at the starting line!
</div>

</div>

<script>
let current = 0;
let sections = document.querySelectorAll(".section");

/* NAVIGATION */
function show(i){
  sections.forEach(s=>s.classList.remove("active"));
  sections[i].classList.add("active");
}

function validate(){
  let inputs = sections[current].querySelectorAll("input, select, textarea");
  for(let i of inputs){
    if(!i.value){
      alert("Harap isi semua data!");
      return false;
    }
  }
  return true;
}

function next(){
  if(!validate()) return;
  current++;
  show(current);
}

function prev(){
  current--;
  show(current);
}

/* SUBMIT */
function submitForm(){
  if(!validate()) return;

  document.querySelector(".container").style.display="none";
  document.getElementById("loading").style.display="block";

  setTimeout(()=>{
    document.getElementById("loading").style.display="none";
    document.getElementById("thankyou").style.display="block";
  },5000);
}

/* COUNTDOWN 10 MENIT */
let time = 600;
let timerEl = document.getElementById("timer");

let countdown = setInterval(()=>{
  let m = Math.floor(time/60);
  let s = time%60;
  timerEl.innerHTML = m+":"+(s<10?"0"+s:s);

  time--;
  if(time < 0){
    clearInterval(countdown);
    current = 1;
    show(current);
  }
},1000);

</script>

</body>
</html>
