<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>International Run Registration</title>

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Poppins', sans-serif;
  background: linear-gradient(135deg, #00c6ff, #0072ff);
  color:#fff;
}

/* HEADER */
.header {
  background: linear-gradient(90deg, #ff416c, #ff4b2b);
  padding:30px;
  text-align:center;
  font-size:28px;
  font-weight:700;
  letter-spacing:1px;
  box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

/* CONTAINER */
.container {
  max-width:600px;
  margin:30px auto;
  background:rgba(255,255,255,0.1);
  padding:25px;
  border-radius:20px;
  backdrop-filter: blur(10px);
}

/* SECTION */
.section {
  display:none;
}
.section.active {
  display:block;
}

/* INPUT */
input, select, textarea {
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:10px;
}

/* BUTTON */
button {
  padding:12px 20px;
  margin-top:15px;
  border:none;
  border-radius:30px;
  background: linear-gradient(90deg, #ff416c, #ff4b2b);
  color:#fff;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}
button:hover {
  transform:scale(1.05);
}

/* LOADING */
.loading {
  display:none;
  text-align:center;
}
.spinner {
  border:6px solid #fff;
  border-top:6px solid #ff416c;
  border-radius:50%;
  width:50px;
  height:50px;
  animation:spin 1s linear infinite;
  margin:20px auto;
}

@keyframes spin {
  0% { transform:rotate(0deg); }
  100% { transform:rotate(360deg); }
}

/* THANK YOU */
.thankyou {
  display:none;
  text-align:center;
  font-size:20px;
}
</style>
</head>

<body>

<div class="header">
🌍 INTERNATIONAL RUN EVENT
</div>

<div class="container">

<!-- SECTION 1 -->
<div class="section active">
<h3>Personal Information</h3>
<input type="text" placeholder="Full Name" id="name">
<input type="email" placeholder="Email" id="email">
<input type="text" placeholder="Phone Number">
<select>
<option>Gender</option>
<option>Male</option>
<option>Female</option>
</select>
<button onclick="next()">Next</button>
</div>

<!-- SECTION 2 -->
<div class="section">
<h3>Race Category</h3>
<select>
<option>Choose Category</option>
<option>5K</option>
<option>10K</option>
<option>Half Marathon</option>
<option>Full Marathon</option>
</select>
<select>
<option>T-Shirt Size</option>
<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>
</select>
<button onclick="prev()">Back</button>
<button onclick="next()">Next</button>
</div>

<!-- SECTION 3 -->
<div class="section">
<h3>Health & Emergency</h3>
<input type="text" placeholder="Blood Type">
<textarea placeholder="Medical Condition"></textarea>
<input type="text" placeholder="Emergency Contact">
<button onclick="prev()">Back</button>
<button onclick="next()">Next</button>
</div>

<!-- SECTION 4 -->
<div class="section">
<h3>Payment</h3>
<select>
<option>Payment Method</option>
<option>Bank Transfer</option>
<option>E-Wallet</option>
<option>Credit Card</option>
</select>
<input type="file">
<button onclick="prev()">Back</button>
<button onclick="submitForm()">Submit</button>
</div>

<!-- LOADING -->
<div class="loading" id="loading">
<div class="spinner"></div>
<p>Processing your registration...</p>
</div>

<!-- THANK YOU -->
<div class="thankyou" id="thankyou">
🎉 Registration Successful! <br><br>
Kami akan konfirmasi melalui E-mail Anda. <br>
Check inbox/spam secara berkala. <br><br>
🔥 See you at the starting line!
</div>

</div>

<!-- SCRIPT -->
<script>
let current = 0;
let sections = document.querySelectorAll(".section");

function show(index){
  sections.forEach(s => s.classList.remove("active"));
  sections[index].classList.add("active");
}

function next(){
  current++;
  show(current);
}

function prev(){
  current--;
  show(current);
}

function submitForm(){
  document.querySelector(".container").style.display="none";
  document.getElementById("loading").style.display="block";

  setTimeout(() => {
    document.getElementById("loading").style.display="none";
    document.getElementById("thankyou").style.display="block";

    sendEmail();
  }, 5000);
}

/* EMAILJS (OPTIONAL AKTIFKAN) */
function sendEmail(){
  // AKTIFKAN jika sudah daftar di emailjs.com
  /*
  emailjs.send("YOUR_SERVICE_ID","YOUR_TEMPLATE_ID",{
    name: document.getElementById("name").value,
    email: document.getElementById("email").value
  });
  */
}
</script>

<!-- EMAILJS CDN -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

</body>
</html>
